name: Build TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # ========== 缓存：Theos + SDK ==========
    - name: Cache Theos
      uses: actions/cache@v4
      with:
        path: theos
        key: theos-v2

    # ========== 缓存：Homebrew 依赖 ==========
    - name: Cache Homebrew
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew
        key: brew-deps-v1-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: brew-deps-v1-

    # ========== 缓存：ChOma + Pwnify 编译产物 ==========
    - name: Cache ChOma Pwnify
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/lib/libcho.a
          /usr/local/include/cho
          /usr/local/lib/libpwnify.a
          /usr/local/include/pwnify
        key: cho-pwnify-v1-${{ hashFiles('ChOma/Makefile', 'Pwnify/Makefile') }}

    - name: Install dependencies
      run: |
        brew install ldid || true
        brew install make || true
        brew install openssl@3 || true
        brew install libarchive || true
        brew install pkg-config || true

    - name: Setup Theos
      run: |
        if [ ! -d "theos/bin" ]; then
          git clone --recursive https://github.com/theos/theos.git theos
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mkdir -p theos/sdks
          mv sdks-master/* theos/sdks/
          rm -rf sdks-master master.zip
        else
          echo "Theos cached, skipping setup"
        fi

    - name: Build ChOma
      run: |
        if [ ! -f "/usr/local/lib/libcho.a" ]; then
          cd ChOma
          make
          sudo make install
          cd ..
        else
          echo "ChOma cached, skipping build"
        fi

    - name: Build Pwnify
      run: |
        if [ ! -f "/usr/local/lib/libpwnify.a" ]; then
          cd Pwnify
          make
          sudo make install
          cd ..
        else
          echo "Pwnify cached, skipping build"
        fi

    # ========== 打包源码（用于 Release 上传）==========
    - name: Pack source archive
      run: |
        git archive --format=zip -o TrollStore-source.zip HEAD

    - name: Build project
      env:
        THEOS: ${{ github.workspace }}/theos
      run: |
        set -e
        export PATH=$THEOS/bin:$PATH
        export THEOS_DEVICE_IP=127.0.0.1
        export THEOS_PLATFORM=ios

        # 首先构建 fastPathSign
        cd Exploits/fastPathSign
        make
        cd ../..

        # 然后按顺序构建其他组件
        make pre_build
        make make_roothelper MAKECMDGOALS=all
        make make_trollstore MAKECMDGOALS=all
        make make_trollhelper_embedded MAKECMDGOALS=all
        make make_trollhelper_package MAKECMDGOALS=all
        make assemble_trollstore
        # 跳过这些需要 InstallerVictim.ipa 的步骤
        # make build_installer15
        # make build_installer64e
        make make_trollstore_lite MAKECMDGOALS=all

        # 验证编译结果
        ls -l _build/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Build
        path: |
          _build/
          TrollStore/packages/*.deb
          TrollHelper/packages/*.deb

    - name: Prepare Victim
      run: |
        mkdir -p Victim
        cd Victim
        # 创建一个最小的 IPA 文件结构
        mkdir -p Payload/Example.app
        touch Payload/Example.app/Example
        zip -r InstallerVictim.ipa Payload
        cd ..
